{% extends "layout.html" %}
{% load static %}

{% block title %}{{ page.title }} – Binco{% endblock %}

{% block content %}
<div class="container my-5 py-5">
    <div class="row">
        <div class="col-lg-8 mx-auto bg-white p-5 rounded-4 shadow-sm">
            <h1 class="display-5 fw-bold mb-4">{{ page.title }}</h1>
            <div class="page-content fs-5 text-secondary">
                {{ page.content|safe|linebreaks }}
            </div>
            
            <hr class="my-5">
            <p class="text-muted small">Last updated: {{ page.updated_at|date:"F d, Y" }}</p>
        </div>
    </div>
</div>

<style>
    .page-content p {
        margin-bottom: 1.5rem;
        line-height: 1.8;
    }
</style>
{% endblock %}
