{% extends 'layout.html' %}
{% block title %}{{ action }} Product – Binco Seller{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="checkout-card">
                <h3><i class="fas fa-box me-2"></i>{{ action }} Product</h3>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-3 mt-2">
                        <div class="col-12">
                            <label class="form-label">Product Name *</label>
                            <input type="text" name="name" class="form-control" required
                                   value="{{ product.name|default:'' }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description *</label>
                            <textarea name="description" class="form-control" rows="4" required>{{ product.description|default:'' }}</textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            <select name="category" class="form-select">
                                <option value="">-- Select Category --</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}"
                                    {% if product and product.category_id == cat.id %}selected{% endif %}>
                                    {{ cat.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Price (৳) *</label>
                            <input type="number" name="price" class="form-control" step="0.01" required
                                   value="{{ product.price|default:'' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Discount Price (৳)</label>
                            <input type="number" name="discount_price" class="form-control" step="0.01"
                                   value="{{ product.discount_price|default:'' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Stock Quantity *</label>
                            <input type="number" name="stock" class="form-control" min="0" required
                                   value="{{ product.stock|default:'0' }}">
                        </div>
                        <div class="col-md-6 d-flex align-items-end">
                            <div class="form-check">
                                <input type="checkbox" name="is_featured" class="form-check-input" id="is_featured"
                                       {% if product.is_featured %}checked{% endif %}>
                                <label class="form-check-label" for="is_featured">Mark as Featured</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Main Product Image</label>
                            {% if product and product.image %}
                            <div class="mb-2"><img src="{{ product.image.url }}" height="80" class="rounded"> <small class="text-muted">Current image</small></div>
                            {% endif %}
                            <input type="file" name="image" accept="image/*" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Additional Images</label>
                            <input type="file" name="extra_images" accept="image/*" multiple class="form-control">
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-3">
                        <button type="submit" class="btn-checkout">
                            <i class="fas fa-save me-2"></i>{{ action }} Product
                        </button>
                        <a href="{% url 'seller_dashboard' %}" class="btn-continue">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
