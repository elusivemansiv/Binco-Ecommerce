{% extends 'layout.html' %}
{% block title %}Sign In – Binco{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo"><span class="logo-bi">Bin</span><span class="logo-nco">co</span></div>
            <h2>Welcome Back!</h2>
            <p>Sign in to your Binco account</p>
        </div>
        <form method="POST" class="auth-form">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
            </div>
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label class="form-label mb-0">Password</label>
                    <a href="#" class="forgot-password-link">Forgot Password?</a>
                </div>
                <div class="password-group">
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
                </div>
            </div>
            <button type="submit" class="auth-btn">Sign In</button>
            <p class="auth-switch mt-3">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
        </form>
    </div>
</div>
{% endblock %}
